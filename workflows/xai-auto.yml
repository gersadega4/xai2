name: xai auto

on:
  workflow_dispatch:
    inputs:
      max_accounts_per_job:
        description: 'Accounts per job (1-5 recommended for first run)'
        required: false
        default: '1'
      headless:
        description: 'Run headless (true/false)'
        required: false
        default: 'true'
      auto_add:
        description: 'Auto-add to 9router (true/false)'
        required: false
        default: 'true'
      delay_seconds:
        description: 'Delay between accounts (seconds)'
        required: false
        default: '12'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        job_id: [1, 2, 3, 4, 5]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb
          google-chrome --version

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Check secrets
        run: |
          set -euo pipefail
          missing=()
          for k in ROUTER9_URL ROUTER9_PASS GMAIL_USER GMAIL_APP_PASSWORD GMAIL_DOMAINS ACCOUNT_PASSWORD PROXIES SCTG_API_KEY; do
            if [ -z "${!k:-}" ]; then
              missing+=("$k")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing secrets: ${missing[*]}"
            echo "::error::Set them in Settings → Secrets → Actions"
            exit 1
          fi
          echo "✓ All required secrets present"
        env:
          ROUTER9_URL: ${{ secrets.ROUTER9_URL }}
          ROUTER9_PASS: ${{ secrets.ROUTER9_PASS }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DOMAINS: ${{ secrets.GMAIL_DOMAINS }}
          ACCOUNT_PASSWORD: ${{ secrets.ACCOUNT_PASSWORD }}
          PROXIES: ${{ secrets.PROXIES }}
          SCTG_API_KEY: ${{ secrets.SCTG_API_KEY }}

      - name: Preflight (proxy + 9router)
        run: |
          set -euo pipefail
          python - <<'PY'
          import os, re, sys
          import curl_cffi.requests as creq

          r9 = os.environ["ROUTER9_URL"].rstrip("/")
          pw = os.environ["ROUTER9_PASS"]
          raw = os.environ["PROXIES"].split(",")[0].strip()
          p = re.split(r"\s+", raw, 1)[0]
          if "://" not in p:
              p = "http://" + p
          proxies = {"http": p, "https": p}

          print("→ proxy egress IP (ipify)...")
          try:
              r = creq.get("https://api.ipify.org?format=json", proxies=proxies, timeout=40, impersonate="chrome")
              print(f"  ✓ proxy OK status={r.status_code} egress={r.text[:80]}")
          except Exception as e:
              print(f"::error::Proxy preflight FAILED: {type(e).__name__}: {e}")
              print("::error::GHA needs WORKING residential proxies. Azure DC alone = CF block.")
              sys.exit(1)

          print("→ 9Router login (direct, no proxy)...")
          try:
              # Try standard requests first (curl_cffi direct session sometimes fails)
              import requests
              r = requests.post(f"{r9}/api/auth/login", json={"password": pw}, timeout=20)
              ok = r.json().get("success") if r.headers.get("content-type","").startswith("application/json") else False
              if not ok and r.status_code not in (200, 201):
                  print(f"::error::9Router login failed status={r.status_code}")
                  sys.exit(1)
              print(f"  ✓ 9Router OK status={r.status_code}")
          except Exception as e:
              print(f"::error::9Router unreachable: {type(e).__name__}: {e}")
              print(f"::error::If 9Router is private VPS, use public URL or tunnel.")
              sys.exit(1)
          PY
        env:
          ROUTER9_URL: ${{ secrets.ROUTER9_URL }}
          ROUTER9_PASS: ${{ secrets.ROUTER9_PASS }}
          PROXIES: ${{ secrets.PROXIES }}

      - name: Write .env (runtime only)
        run: |
          cat > .env <<EOF
          ROUTER9_URL=${{ secrets.ROUTER9_URL }}
          ROUTER9_PASS=${{ secrets.ROUTER9_PASS }}
          GMAIL_USER=${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD=${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_DOMAINS=${{ secrets.GMAIL_DOMAINS }}
          PASSWORD=${{ secrets.ACCOUNT_PASSWORD }}
          PROXIES=${{ secrets.PROXIES }}
          SCTG_API_KEY=${{ secrets.SCTG_API_KEY }}
          SCTG_FIRST=true
          SCTG_TIMEOUT=${{ secrets.SCTG_TIMEOUT || '45' }}
          SCTG_RETRIES=${{ secrets.SCTG_RETRIES || '3' }}
          SCTG_QUIET=true
          HEADLESS=${{ github.event.inputs.headless || 'true' }}
          HEADLESS_MODE=new
          AUTO_ADD=${{ github.event.inputs.auto_add || 'true' }}
          MAX_ACCOUNTS=${{ github.event.inputs.max_accounts_per_job || '1' }}
          BATCH_SIZE=1
          DELAY_SECONDS=${{ github.event.inputs.delay_seconds || '12' }}
          PAUSE_SECONDS=20
          MAX_ACCOUNT_RETRIES=3
          EOF
          chmod 600 .env
          echo "✓ .env written (runtime only, chmod 600)"

      - name: Run signup (headless)
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          python grok-signup-playwright-gmail-headless.py --auto-add
        timeout-minutes: 25

      - name: Redact sensitive logs
        if: always()
        run: |
          if [ -f sso.txt ]; then
            # Redact emails but keep count
            wc -l sso.txt || true
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grok-accounts-job-${{ matrix.job_id }}
          path: |
            sso.txt
            *.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          rm -f .env
          rm -rf /tmp/grok-pw-* /tmp/grok-router-* || true
          echo "✓ cleanup done"
